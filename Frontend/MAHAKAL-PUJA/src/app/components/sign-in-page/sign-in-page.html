<div class="RAM">
	<div class="sign-in-container">
		<div class="logo-wrapper">
			<img src="assets/images/LORD_NATRAJ.png" alt="Lord Natraj" class="logo" />
		</div>

		<form [formGroup]="signInForm" (ngSubmit)="onSubmit()" novalidate>
			<div class="form-group">
				<label for="contact">{{ text.emailLabel }}</label>

				<input
					id="contact"
					type="email"
					formControlName="contact"
					[placeholder]="text.emailPlaceholder"
					(blur)="signInForm.get('contact')?.markAsTouched()"
				/>

				<div
					class="error"
					*ngIf="(f['contact'].touched || f['contact'].dirty || submitted) && f['contact'].invalid"
				>
					<span *ngIf="f['contact'].errors?.['required']">{{ text.emailRequiredError }}</span>
					<span *ngIf="f['contact'].errors?.['email']">
						{{ text.emailInvalidError }}
					</span>
				</div>

				<div class="error" *ngIf="fieldBackendErrors['contact']">{{ fieldBackendErrors['contact'] }}</div>
			</div>

			<div class="form-group">
				<label for="password">{{ text.passwordLabel }}</label>

				<div class="password-field">
					<input
						id="password"
						[type]="passwordVisible ? 'text' : 'password'"
						formControlName="password"
						[placeholder]="text.passwordPlaceholder"
						(blur)="signInForm.get('password')?.markAsTouched()"
					/>

					<button
						type="button"
						class="toggle-password"
						(click)="togglePasswordVisibility()"
						[attr.aria-label]="passwordVisible ? 'Hide password' : 'Show password'"
					>
						<svg
							*ngIf="!passwordVisible"
							viewBox="0 0 24 24"
							aria-hidden="true"
							focusable="false"
						>
							<path
								d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7Zm0 11.5A4.5 4.5 0 1 1 12 7a4.5 4.5 0 0 1 0 9.5Zm0-7.2A2.7 2.7 0 1 0 12 14.7a2.7 2.7 0 0 0 0-5.4Z"
							/>
						</svg>

						<svg
							*ngIf="passwordVisible"
							viewBox="0 0 24 24"
							aria-hidden="true"
							focusable="false"
						>
							<path
								d="m3.28 2 18.72 18.72-1.28 1.28-3.07-3.07A12.98 12.98 0 0 1 12 20c-5 0-9.27-3.11-11-7a12.94 12.94 0 0 1 4.18-4.94L2 3.28 3.28 2Zm5.01 5.01 1.53 1.53A4.43 4.43 0 0 1 12 8c2.49 0 4.5 2.01 4.5 4.5 0 .76-.19 1.47-.54 2.09l1.53 1.53A6.21 6.21 0 0 0 18.3 12 6.3 6.3 0 0 0 8.29 7.01ZM6.74 9.3A10.84 10.84 0 0 0 3.2 13c1.73 3.89 6 7 11 7 1.54 0 3-.29 4.31-.81l-2.24-2.24A4.46 4.46 0 0 1 12 17a4.5 4.5 0 0 1-4.5-4.5c0-1.02.34-1.96.91-2.72L6.74 9.3ZM12 10.2l1.8 1.8c0 .17 0 .33-.04.5a1.8 1.8 0 0 1-2.22 1.26 1.78 1.78 0 0 1-1.26-2.22c.04-.17.09-.33.18-.48L12 10.2ZM12 4c5 0 9.27 3.11 11 7a12.9 12.9 0 0 1-2.91 4.07l-1.27-1.27A10.75 10.75 0 0 0 20.8 11c-1.73-3.89-6-7-11-7-1.3 0-2.55.21-3.72.6L4.5 3.02A13.3 13.3 0 0 1 12 4Z"
							/>
						</svg>
					</button>
				</div>

				<div
					class="error"
					*ngIf="(f['password'].touched || f['password'].dirty || submitted) && f['password'].invalid"
				>
					<span *ngIf="f['password'].errors?.['required']">{{ text.passwordRequiredError }}</span>
					<span *ngIf="f['password'].errors?.['pattern']">{{ text.passwordPatternError }}</span>
				</div>

				<div class="error" *ngIf="fieldBackendErrors['password']">{{ fieldBackendErrors['password'] }}</div>

				<button type="button" class="forgot-password-link" (click)="onForgotPassword()">
					{{ text.forgotPasswordLinkText }}
				</button>
			</div>

			<div class="error submit-error" *ngIf="backendError">{{ backendError }}</div>

			<button type="submit" [disabled]="isSubmitting">
				{{ isSubmitting ? text.signingInButton : text.signInButton }}
			</button>

			<hr class="divider" />

			<div class="alt-action">
				{{ text.altPrompt }}
				<a routerLink="/sign-up" class="sign-in-link">{{ text.altLinkText }}</a>
			</div>
		</form>
	</div>
</div>
