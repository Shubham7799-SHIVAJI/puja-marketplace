<div class="RAM">
  <!-- Brand logo above white box -->
  <div class="auth-brand-logo">
    <span class="auth-brand-logo__icon">🪔</span>
    <div class="auth-brand-logo__text">
      <span class="auth-brand-logo__name">Daily Puja</span>
      <span class="auth-brand-logo__tagline">Sacred &amp; Authentic</span>
    </div>
  </div>

  <div class="login-container">
    <div class="logo-wrapper">
      <img src="assets/images/LORD_NATRAJ.png" alt="Lord Natraj" class="logo" />
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-group">
        <label for="name">{{ text.nameLabel }}</label>

        <input
          id="name"
          type="text"
          formControlName="name"
          [placeholder]="text.namePlaceholder"
          (blur)="loginForm.get('name')?.markAsTouched()"
        />

        <div
          class="error"
          *ngIf="(f['name'].touched || f['name'].dirty || submitted) && f['name'].invalid"
        >
          <span class="name-error" *ngIf="f['name'].errors?.['required']">
            {{ text.nameRequiredError }}
          </span>

          <span *ngIf="f['name'].errors?.['pattern']">
            {{ text.namePatternError }}
          </span>
        </div>
      </div>

      <div class="form-group">
        <label for="contact">{{ text.contactLabel }}</label>

        <div class="contact-input">
          <input
            id="contact"
            type="text"
            formControlName="contact"
            [placeholder]="text.contactPlaceholder"
            (blur)="loginForm.get('contact')?.markAsTouched()"
          />
        </div>

        <div
          class="error"
          *ngIf="(f['contact'].touched || f['contact'].dirty || submitted) && f['contact'].invalid"
        >
          <span *ngIf="f['contact'].errors?.['required']">
            {{ text.contactRequiredError }}
          </span>

          <span *ngIf="f['contact'].errors?.['email']">
            {{ text.contactInvalidError }}
          </span>
        </div>

		<div class="error" *ngIf="fieldBackendErrors['contact']">{{ fieldBackendErrors['contact'] }}</div>
      </div>

		<div class="error" *ngIf="fieldBackendErrors['name']">{{ fieldBackendErrors['name'] }}</div>

      <div class="error submit-error" *ngIf="backendError">
        {{ backendError }}
      </div>

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? text.submittingButton : text.continueButton }}
      </button>

      <hr class="divider" />

      <div class="alt-action">
        {{ text.altPrompt }}
        <a routerLink="/signin" class="sign-in-link">{{ text.altLinkText }}</a>
      </div>
    </form>
  </div>
</div>
