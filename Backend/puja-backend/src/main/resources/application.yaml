spring:
  application:
    name: puja-backend
  cache:
    type: simple
  data:
    redis:
      repositories:
        enabled: false

  datasource:
    url: jdbc:mysql://localhost:3306/puja_marketplace
    username: root
    password: 8848
    driver-class-name: com.mysql.cj.jdbc.Driver

  mail:
    host: smtp.gmail.com
    port: 587
    username: agarwal.77.99shubham@gmail.com
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

server:
  port: 8080

app:
  mail:
    logo-path: src/main/java/com/SHIVA/puja/images/LORD-NATRAJ.png
    subject: Puja Marketplace Login OTP
  otp:
    expiration-minutes: 5
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from-number: ${TWILIO_PHONE_NUMBER:}
  security:
    jwt-secret: ${JWT_SECRET:change-this-jwt-secret-before-production-change-this-jwt-secret}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
    admin-email: ${ADMIN_EMAIL:admin@puja-marketplace.local}
    admin-password: ${ADMIN_PASSWORD:Admin@12345}
    admin-name: ${ADMIN_NAME:System Admin}
  rate-limit:
    requests: ${RATE_LIMIT_REQUESTS:120}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}